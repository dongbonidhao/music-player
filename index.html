<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小波音乐网欢迎光临</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { opacity: 0.8; font-size: 0.9rem; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); }
        #searchInput { flex: 1; padding: 12px 16px; border: none; border-radius: 8px; font-size: 1rem; outline: none; background: rgba(255,255,255,0.9); }
        #searchInput::placeholder { color: #999; }
        button { padding: 12px 24px; background: #ff6b6b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.3s; }
        button:hover { background: #ff5252; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .playlist-section { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .playlist-header h2 { font-size: 1.3rem; }
        .song-list { max-height: 400px; overflow-y: auto; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; transition: all 0.2s; cursor: pointer; }
        .song-item:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); }
        .song-item.active { background: rgba(255,255,255,0.2); border-left: 4px solid #ff6b6b; }
        .song-info { flex: 1; }
        .song-title { font-weight: 600; margin-bottom: 4px; }
        .song-artist { font-size: 0.85rem; opacity: 0.7; }
        .song-duration { font-size: 0.85rem; opacity: 0.6; }
        
        .player-section { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px); position: sticky; bottom: 0; margin-top: 20px; }
        .now-playing { text-align: center; margin-bottom: 15px; }
        .now-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .now-artist { opacity: 0.8; }
        .progress-container { margin: 15px 0; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; cursor: pointer; }
        .progress-fill { height: 100%; background: #ff6b6b; width: 0%; transition: width 0.1s linear; }
        .time-display { display: flex; justify-content: space-between; font-size: 0.85rem; opacity: 0.7; margin-top: 5px; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .control-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 10px; transition: all 0.2s; }
        .control-btn:hover { transform: scale(1.1); }
        .play-btn { width: 60px; height: 60px; border-radius: 50%; background: #ff6b6b !important; font-size: 1.8rem !important; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
        .volume-control { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 10px 0; }
        .volume-slider { width: 120px; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: white; cursor: pointer; }
        
        .settings { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .settings select, .settings input { padding: 6px 10px; border-radius: 6px; border: none; background: rgba(255,255,255,0.9); font-size: 0.9rem; }
        
        .status-msg { text-align: center; margin: 10px 0; font-size: 0.9rem; opacity: 0.9; min-height: 20px; }
        .loading { opacity: 0.6; }
        .error { color: #ffcc00; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 简易音乐播放器</h1>
            <p class="subtitle">配置灵活 | 自动切换失效接口</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入歌曲、歌手..." />
            <button onclick="searchMusic()">搜索</button>
        </div>
        
        <div class="playlist-section">
            <div class="playlist-header">
                <h2>播放列表</h2>
                <span id="songCount">0 首歌曲</span>
            </div>
            <div id="statusMsg" class="status-msg"></div>
            <div class="song-list" id="songList"></div>
        </div>
        
        <div class="player-section">
            <div class="now-playing">
                <div class="now-title" id="nowTitle">未播放</div>
                <div class="now-artist" id="nowArtist">-</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="control-btn" onclick="prevSong()">⏮</button>
                <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="control-btn" onclick="nextSong()">⏭</button>
            </div>
            
            <div class="volume-control">
                <span>🔈</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)" />
                <span>🔊</span>
            </div>
            
            <div class="settings">
                <select id="sourceSelect" onchange="switchSource()">
                    <option value="0">音源: API.NETEASE (默认)</option>
                </select>
                <select id="proxySelect" onchange="switchProxy()">
                    <option value="-1">代理: 不使用</option>
                    <option value="0">代理: Codetabs</option>
                    <option value="1">代理: CORS Anywhere</option>
                </select>
                <button onclick="testConnections()" style="padding: 6px 12px; font-size: 0.9rem;">测试连接</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" ontimeupdate="updateProgress()" onended="nextSong()"></audio>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
